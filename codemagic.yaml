workflows:
  android-workflow:
    name: Android Build
    environment:
      java: 17
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Clean and regenerate Gradle wrapper
        script: |
          cd android
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          gradle wrapper --gradle-version 8.3
          chmod +x gradlew
          cd ..
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Generate Isar models
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: flutter build apk --release -v
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
