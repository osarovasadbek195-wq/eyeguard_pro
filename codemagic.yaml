workflows:
  android-workflow:
    name: Android Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Fetch and setup gradlew
        script: |
          cd android
          curl -L -o gradlew "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew"
          chmod +x gradlew
          cd ..
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Generate Isar models
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
