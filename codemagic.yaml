workflows:
  android-workflow:
    name: Android Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Regenerate Android project files (Fix Gradle)
        script: |
          rm -rf android/gradlew
          rm -rf android/gradlew.bat
          rm -rf android/gradle/wrapper/gradle-wrapper.jar
          flutter create . --platforms=android
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Generate Isar models
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
