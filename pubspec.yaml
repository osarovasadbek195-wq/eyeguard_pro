name: eyeguard_pro
description: EyeGuard Pro - Ko'z himoyasi va mashqlari premium ilovasi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Camera & AI
  camera: ^0.10.5+5
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.0.5

  # Background Services
  flutter_background_service: ^5.0.5
  awesome_notifications: ^3.1.3

  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.6

  # Sensors
  sensors_plus: ^4.0.2

  # File Export
  share_plus: ^7.2.1
  csv: ^5.1.1
  pdf: ^3.10.7

  # Utils
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/models/
